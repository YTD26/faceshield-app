name: faceshield
description: AI-powered face detection and blurring app for privacy protection.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_mlkit_face_detection: ^0.11.0
  image_picker: ^1.0.0
  video_player: ^2.8.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  gal: ^2.3.0
  share_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
